<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="kopi-wealth">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1A3026">
  <link rel="manifest" href="/manifest.json">
  <title>{{TITLE}}</title>
  <script>
    (function(){var t=localStorage.getItem('kopi-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <style>
    :root[data-theme="dark"] {
      color-scheme: dark;
      --color-bg: #1A3026;
      --color-surface: #2B2118;
      --color-accent: #C7A052;
      --color-text: #F0EAD6;
      --color-text-muted: #A0956B;
      --color-border: rgba(199,160,82,0.25);
      --color-input-bg: rgba(255,255,255,0.05);
      --color-error: #CC5500;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --color-bg: #F5F0E8;
      --color-surface: #FFFFFF;
      --color-accent: #C7A052;
      --color-text: #1A1A1A;
      --color-text-muted: #5A5A5A;
      --color-border: rgba(26,48,38,0.2);
      --color-input-bg: #FFFFFF;
      --color-error: #CC5500;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--color-accent); text-decoration: none; }
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      height: 3.25rem;
      gap: 0.5rem;
    }
    .header-left { flex: 1; display: flex; align-items: center; }
    .header-logo { font-size: 1.1rem; font-weight: 700; color: var(--color-accent); flex: 1; text-align: center; }
    .header-right { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 0.5rem; }
    main { flex: 1; padding: 1rem; padding-bottom: calc(4rem + env(safe-area-inset-bottom)); }
    main.no-nav { padding-bottom: 1rem; }
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex;
      height: calc(4rem + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .bottom-nav.hidden { display: none; }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      color: var(--color-text-muted);
      font-size: 0.65rem;
      text-decoration: none;
      transition: color 0.12s;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0.5rem 0;
    }
    .nav-item:hover, .nav-item.active { color: var(--color-accent); }
    .nav-icon { font-size: 1.35rem; line-height: 1; }
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 0.75rem;
      padding: 1rem;
    }
    .btn-primary {
      background: var(--color-accent);
      color: #1A1A1A;
      border: none;
      border-radius: 0.5rem;
      padding: 0.65rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.12s;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost {
      background: transparent;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      padding: 0.65rem 1.25rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .btn-ghost:hover { color: var(--color-accent); border-color: var(--color-accent); }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    label { font-size: 0.85rem; color: var(--color-text-muted); }
    input, select {
      background: var(--color-input-bg);
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      padding: 0.65rem 0.75rem;
      color: var(--color-text);
      font-size: 0.95rem;
      width: 100%;
      color-scheme: inherit;
    }
    input:focus, select:focus { outline: none; border-color: var(--color-accent); }
    .error { color: var(--color-error); font-size: 0.85rem; }
    /* Avatar & user panel */
    .avatar-btn {
      width: 2.25rem; height: 2.25rem;
      border-radius: 50%;
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-accent);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.12s;
    }
    .avatar-btn:hover { border-color: var(--color-accent); }
    .panel-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
    }
    .panel-overlay.open { display: block; }
    .panel-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      border-radius: 1rem 1rem 0 0;
      padding: 1.25rem 1rem calc(1.5rem + env(safe-area-inset-bottom));
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    .panel-overlay.open .panel-sheet { transform: translateY(0); }
    .panel-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; }
    .panel-avatar {
      width: 3rem; height: 3rem;
      border-radius: 50%;
      background: var(--color-bg);
      border: 1.5px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; color: var(--color-accent);
    }
    .panel-name { font-weight: 600; font-size: 1rem; }
    .panel-email { font-size: 0.8rem; color: var(--color-text-muted); }
    .panel-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      color: var(--color-text);
      font-size: 0.95rem;
      background: none; border-left: none; border-right: none; border-top: none;
      width: 100%; text-align: left;
      text-decoration: none;
    }
    .panel-row:last-child { border-bottom: none; }
    .panel-row:hover { color: var(--color-accent); }
    .panel-row.danger { color: var(--color-error); }
    .panel-row.danger:hover { color: var(--color-error); opacity: 0.8; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">{{HEADER_LEFT}}</div>
    <div class="header-logo">☕ kopi-wealth</div>
    <div class="header-right">
      {{HEADER_RIGHT}}
      {{USER_PANEL}}
    </div>
  </header>

  <main class="{{MAIN_CLASS}}">
    {{BODY}}
  </main>

  <nav class="bottom-nav {{HIDE_NAV}}">
    <a href="/dashboard" class="nav-item {{NAV_DASHBOARD}}">
      <span class="nav-icon">🏠</span>
      <span>Dashboard</span>
    </a>
    <a href="/accounts" class="nav-item {{NAV_ACCOUNTS}}">
      <span class="nav-icon">🏦</span>
      <span>Accounts</span>
    </a>
    <a href="/cpf" class="nav-item {{NAV_CPF}}">
      <span class="nav-icon">🏛️</span>
      <span>CPF</span>
    </a>
  </nav>

  {{USER_PANEL_MODAL}}

  <script>
    function openPanel(){document.getElementById('user-overlay').classList.add('open');}
    function closePanel(){document.getElementById('user-overlay').classList.remove('open');}
    function toggleTheme(){
      var h=document.documentElement;
      var t=h.getAttribute('data-theme')==='dark'?'light':'dark';
      h.setAttribute('data-theme',t);
      localStorage.setItem('kopi-theme',t);
      var b=document.getElementById('theme-btn');
      if(b)b.textContent=t==='dark'?'☀️ Light mode':'🌙 Dark mode';
    }
    if('serviceWorker' in navigator){navigator.serviceWorker.register('/service-worker.js');}
  </script>
</body>
</html>
