name: Deploy

on:
  push:
    branches: ['**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Check migrations (preview)
        if: github.ref != 'refs/heads/main'
        run: |
          STAGE=preview
          STACK="wealth-${STAGE}"
          if aws cloudformation describe-stacks --stack-name "$STACK" --region ap-southeast-1 >/dev/null 2>&1; then
            npm run migrate:check:preview
          else
            echo "No existing stack — skipping migration check for first deploy."
          fi

      - name: Check migrations (prod)
        if: github.ref == 'refs/heads/main'
        run: |
          STAGE=prod
          STACK="wealth-${STAGE}"
          if aws cloudformation describe-stacks --stack-name "$STACK" --region ap-southeast-1 >/dev/null 2>&1; then
            npm run migrate:check:prod
          else
            echo "No existing stack — skipping migration check for first deploy."
          fi

      - name: Ensure Secrets Manager secrets (preview)
        if: github.ref != 'refs/heads/main'
        env:
          SSO_CLIENT_SECRET: ${{ secrets.SSO_CLIENT_SECRET_PREVIEW }}
        run: |
          ensure_secret() {
            local name="$1" value="$2"
            if ! aws secretsmanager describe-secret --secret-id "$name" --region ap-southeast-1 >/dev/null 2>&1; then
              aws secretsmanager create-secret --name "$name" --secret-string "$value" --region ap-southeast-1
              echo "Created: $name"
            else
              echo "Exists:  $name"
            fi
          }
          ensure_secret "wealth/preview/sso-client-secret" "$SSO_CLIENT_SECRET"

      - name: Ensure Secrets Manager secrets (prod)
        if: github.ref == 'refs/heads/main'
        env:
          SSO_CLIENT_SECRET: ${{ secrets.SSO_CLIENT_SECRET_PROD }}
        run: |
          ensure_secret() {
            local name="$1" value="$2"
            if ! aws secretsmanager describe-secret --secret-id "$name" --region ap-southeast-1 >/dev/null 2>&1; then
              aws secretsmanager create-secret --name "$name" --secret-string "$value" --region ap-southeast-1
              echo "Created: $name"
            else
              echo "Exists:  $name"
            fi
          }
          ensure_secret "wealth/prod/sso-client-secret" "$SSO_CLIENT_SECRET"

      - name: Create domain (idempotent, preview)
        if: github.ref != 'refs/heads/main'
        run: npx serverless create_domain --stage preview || true
        env:
          ACM_CERT_ARN: ${{ secrets.ACM_CERT_ARN_PREVIEW }}

      - name: Create domain (idempotent, prod)
        if: github.ref == 'refs/heads/main'
        run: npx serverless create_domain --stage prod || true
        env:
          ACM_CERT_ARN: ${{ secrets.ACM_CERT_ARN_PROD }}

      - name: Deploy → Preview
        if: github.ref != 'refs/heads/main'
        env:
          ACM_CERT_ARN: ${{ secrets.ACM_CERT_ARN_PREVIEW }}
          SSO_ISSUER: ${{ secrets.SSO_ISSUER_PREVIEW }}
          SSO_CLIENT_ID: ${{ secrets.SSO_CLIENT_ID_PREVIEW }}
          ADMIN_SUB: ${{ secrets.ADMIN_SUB_PREVIEW }}
        run: npx serverless deploy --stage preview --verbose

      - name: Deploy → Production
        if: github.ref == 'refs/heads/main'
        env:
          ACM_CERT_ARN: ${{ secrets.ACM_CERT_ARN_PROD }}
          SSO_ISSUER: ${{ secrets.SSO_ISSUER_PROD }}
          SSO_CLIENT_ID: ${{ secrets.SSO_CLIENT_ID_PROD }}
          ADMIN_SUB: ${{ secrets.ADMIN_SUB_PROD }}
        run: npx serverless deploy --stage prod --verbose
