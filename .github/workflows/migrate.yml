name: Run Migrations

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Target stage'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - prod
      allow_destructive:
        description: 'Allow destructive migrations'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Run migrations (without destructive)
        if: ${{ !inputs.allow_destructive }}
        run: npm run migrate:${{ inputs.stage }}

      - name: Run migrations (with destructive)
        if: ${{ inputs.allow_destructive }}
        run: npm run migrate:${{ inputs.stage }} -- --allow-destructive
