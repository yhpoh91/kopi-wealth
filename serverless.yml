service: wealth

frameworkVersion: '3'

plugins:
  - serverless-esbuild
  - serverless-domain-manager

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-southeast-1
  stage: ${opt:stage, 'preview'}
  environment:
    STAGE: ${self:provider.stage}
    TABLE_NAME: wealth-${self:provider.stage}-data
    SSO_ISSUER: ${env:SSO_ISSUER, ''}
    SSO_CLIENT_ID: ${env:SSO_CLIENT_ID, ''}
    ADMIN_SUB: ${env:ADMIN_SUB, ''}
    # Secrets fetched at runtime from Secrets Manager (wealth/${stage}/*)
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource:
            - !GetAtt WealthDataTable.Arn
            - !Sub '${WealthDataTable.Arn}/index/*'
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: !Sub 'arn:aws:secretsmanager:ap-southeast-1:${AWS::AccountId}:secret:wealth/${self:provider.stage}/*'
  httpApi:
    cors:
      allowedOrigins: ['*']
      allowedHeaders: ['Content-Type', 'Authorization', 'Cookie']
      allowedMethods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
      allowCredentials: false

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    exclude:
      - '@aws-sdk/*'
    target: node22
    platform: node
    loader:
      .html: text

  domainNames:
    prod: wealth.kopi.life
    preview: wealth-preview.kopi.life

  customDomain:
    domainName: ${self:custom.domainNames.${self:provider.stage}}
    certificateArn: ${env:ACM_CERT_ARN, ''}
    apiType: http
    endpointType: regional
    createRoute53Record: false
    autoDomain: false

functions:
  health:
    handler: src/handlers/health.handler
    name: wealth-${self:provider.stage}-health
    events:
      - httpApi:
          method: GET
          path: /health

  authLogin:
    handler: src/handlers/auth/login.handler
    name: wealth-${self:provider.stage}-auth-login
    events:
      - httpApi:
          method: GET
          path: /auth/login

  authCallback:
    handler: src/handlers/auth/callback.handler
    name: wealth-${self:provider.stage}-auth-callback
    events:
      - httpApi:
          method: GET
          path: /auth/callback

  authLogout:
    handler: src/handlers/auth/logout.handler
    name: wealth-${self:provider.stage}-auth-logout
    events:
      - httpApi:
          method: GET
          path: /auth/logout
      - httpApi:
          method: POST
          path: /auth/logout

  dashboard:
    handler: src/handlers/dashboard.handler
    name: wealth-${self:provider.stage}-dashboard
    events:
      - httpApi:
          method: GET
          path: /

  accounts:
    handler: src/handlers/accounts.handler
    name: wealth-${self:provider.stage}-accounts
    events:
      - httpApi:
          method: GET
          path: /accounts
      - httpApi:
          method: POST
          path: /accounts
      - httpApi:
          method: POST
          path: /accounts/{id}
      - httpApi:
          method: POST
          path: /accounts/{id}/delete

  settings:
    handler: src/handlers/settings.handler
    name: wealth-${self:provider.stage}-settings
    events:
      - httpApi:
          method: GET
          path: /settings
      - httpApi:
          method: POST
          path: /settings

  manifest:
    handler: src/handlers/static/manifest.handler
    name: wealth-${self:provider.stage}-manifest
    events:
      - httpApi:
          method: GET
          path: /manifest.json

  serviceWorker:
    handler: src/handlers/static/service-worker.handler
    name: wealth-${self:provider.stage}-service-worker
    events:
      - httpApi:
          method: GET
          path: /service-worker.js

resources:
  Resources:
    WealthDataTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      Properties:
        TableName: wealth-${self:provider.stage}-data
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true
